<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เงินห้อง/1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="app" class="max-w-md mx-auto px-4 pt-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600 mb-1">💰 เงินห้อง/1</h1>
            <p class="text-gray-500 text-sm">Room Fund Management</p>
        </header>

        <!-- ส่วนล็อกอิน/สมัครสมาชิก -->
        <div id="auth-view" class="bg-white rounded-3xl p-8 shadow-xl border border-gray-100">
            <div class="flex mb-6 bg-gray-100 p-1 rounded-xl">
                <button onclick="toggleAuthMode('login')" id="btn-login-mode" class="flex-1 py-2 rounded-lg font-semibold bg-white shadow-sm transition-all">เข้าสู่ระบบ</button>
                <button onclick="toggleAuthMode('signup')" id="btn-signup-mode" class="flex-1 py-2 rounded-lg font-semibold text-gray-500 transition-all">สมัครใหม่</button>
            </div>
            
            <div class="space-y-4">
                <div id="signup-extra-fields" class="hidden">
                    <input type="text" id="full-name" placeholder="ชื่อ-นามสกุล" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-400 mb-4">
                </div>
                <!-- ใช้เลขที่แทน Email -->
                <input type="number" id="student-no" placeholder="เลขที่ (เช่น 1)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                <input type="password" id="password" placeholder="รหัสผ่าน" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                <button onclick="handleAuth()" id="auth-submit-btn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 active:scale-95 transition-all">เข้าสู่ระบบ</button>
            </div>
        </div>

        <!-- ส่วนหน้าจอหลัก -->
        <div id="main-view" class="hidden space-y-6">
            <div class="bg-blue-600 rounded-3xl p-8 text-white shadow-lg">
                <p class="opacity-80 text-sm mb-1">ยอดเงินคงเหลือห้อง</p>
                <h2 id="room-total" class="text-4xl font-bold">0.00 บาท</h2>
                <div class="mt-4 pt-4 border-t border-white/20 text-sm">
                    <span id="user-display">กำลังโหลด...</span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 mb-4">📥 แจ้งส่งเงิน</h3>
                <div class="space-y-3">
                    <input type="number" id="amount" placeholder="ระบุจำนวนเงิน" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="file" id="slip-file" class="w-full text-xs text-gray-500 py-2" accept="image/*">
                    <button onclick="submitSlip()" class="w-full py-4 bg-gray-800 text-white rounded-2xl font-bold hover:bg-black transition-all">ส่งสลิปยืนยัน</button>
                </div>
            </div>

            <button onclick="signOut()" class="w-full py-3 text-gray-400 text-sm">ออกจากระบบ</button>
        </div>
    </div>

    <script>
        // ใส่ URL และ Key ของดิสนีย์ตรงนี้
        const SB_URL = 'https://zhvhnshjfcabdxisszkd.supabase.co'; 
        const SB_KEY = 'sb_publishable_T4ZXpGnSFN3zgee_SJXICQ_4T_IU8pH';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let isLoginMode = true;

        function toggleAuthMode(mode) {
            isLoginMode = mode === 'login';
            document.getElementById('signup-extra-fields').classList.toggle('hidden', isLoginMode);
            document.getElementById('btn-login-mode').className = isLoginMode ? 'flex-1 py-2 rounded-lg font-semibold bg-white shadow-sm' : 'flex-1 py-2 rounded-lg font-semibold text-gray-500';
            document.getElementById('btn-signup-mode').className = !isLoginMode ? 'flex-1 py-2 rounded-lg font-semibold bg-white shadow-sm' : 'flex-1 py-2 rounded-lg font-semibold text-gray-500';
            document.getElementById('auth-submit-btn').innerText = isLoginMode ? 'เข้าสู่ระบบ' : 'สมัครสมาชิกใหม่';
        }

        async function handleAuth() {
            const studentNo = document.getElementById('student-no').value;
            const password = document.getElementById('password').value;
            // แปลงเลขที่เป็น Email ปลอมเพื่อให้ Supabase Auth ทำงานได้
            const fakeEmail = `student${studentNo}@roomfund.com`;

            if (isLoginMode) {
                const { error } = await sb.auth.signInWithPassword({ email: fakeEmail, password: password });
                if (error) alert('เลขที่หรือรหัสผ่านไม่ถูกต้องครับ'); else location.reload();
            } else {
                const fullName = document.getElementById('full-name').value;
                const { data, error } = await sb.auth.signUp({ email: fakeEmail, password: password });
                if (error) return alert('เลขที่นี้อาจมีคนใช้แล้วหรือข้อมูลไม่ครบ');
                if (data.user) {
                    await sb.from('profiles').insert([{ id: data.user.id, full_name: fullName, student_no: studentNo }]);
                    alert('สมัครสำเร็จ! ล็อกอินเข้าใช้งานได้เลย');
                    location.reload();
                }
            }
        }

        async function checkSession() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                loadData(user);
            }
        }

        async function loadData(user) {
            const { data: prof } = await sb.from('profiles').select('*').eq('id', user.id).single();
            if (prof) document.getElementById('user-display').innerText = `ผู้ใช้: ${prof.full_name} (เลขที่ ${prof.student_no})`;
            const { data: tx } = await sb.from('transactions').select('amount').eq('status', 'approved');
            const total = tx ? tx.reduce((sum, t) => sum + Number(t.amount), 0) : 0;
            document.getElementById('room-total').innerText = total.toLocaleString() + ' บาท';
        }

        async function submitSlip() {
            const amount = document.getElementById('amount').value;
            const file = document.getElementById('slip-file').files[0];
            const { data: { user } } = await sb.auth.getUser();
            if (!amount || !file) return alert('กรอกข้อมูลไม่ครบ');
            const fileName = `slip_${Date.now()}_${user.id}`;
            await sb.storage.from('slips').upload(fileName, file);
            await sb.from('transactions').insert([{ user_id: user.id, amount: amount, slip_url: fileName }]);
            alert('ส่งสลิปแล้ว! รอแอดมินตรวจนะครับ');
            location.reload();
        }

        async function signOut() { await sb.auth.signOut(); location.reload(); }
        window.onload = checkSession;
    </script>
</body>
</html>
